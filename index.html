<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<title>Mobile Web Game Fullscreen</title>

<!-- Viewport ottimizzato per mobile game -->
<meta name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no">

<!-- Colore UI quando è PWA -->
<meta name="theme-color" content="#000000">

<!-- Disabilita selezioni / highlight -->
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

#game {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a1a1a, #000);
  color: white;
  font-family: sans-serif;
  font-size: 24px;
  text-align: center;
}

/* Safe area (notch / punch hole S23 Ultra) */
#game {
  padding:
    env(safe-area-inset-top)
    env(safe-area-inset-right)
    env(safe-area-inset-bottom)
    env(safe-area-inset-left);
}
</style>
</head>

<body>

<div id="game">
  🎮<br>
  Web Game Fullscreen<br><br>
  👉 Aggiungimi alla schermata Home<br>
  per rimuovere la barra di Chrome
</div>

<script>
/*
  Fullscreen API (fallback)
  NON è affidabile su mobile,
  ma aiuta prima di installare la PWA
*/
document.body.addEventListener("click", () => {
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(()=>{});
  }
});

/*
  Trucco: nasconde la barra il più possibile allo scroll
*/
window.scrollTo(0, 1);

/*
  Messaggio se NON è aperto come app
*/
if (!window.matchMedia('(display-mode: standalone)').matches) {
  console.log("Apri da schermata Home per full screen reale");
}
</script>

</body>
</html>
