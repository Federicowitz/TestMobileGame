<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeGame PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Reset e Fullscreen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Blocca lo scroll */
            background-color: #000;
            touch-action: none; /* Disabilita zoom e gesture del browser */
        }

        /* Canvas del gioco */
        canvas {
            display: block;
            image-rendering: pixelated; /* Stile retro */
        }

        /* D-PAD Virtuale (Solo visualizzato se necessario, o sempre sopra) */
        #dpad {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            z-index: 10;
            display: none; /* Nascosto su desktop di default, mostrato via JS se touch */
        }
        
        .btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            touch-action: none;
        }
        .btn:active { background: rgba(255, 255, 255, 0.6); }

        /* Posizionamento pulsanti */
        #up { top: 0; left: 50px; }
        #down { bottom: 0; left: 50px; }
        #left { top: 50px; left: 0; }
        #right { top: 50px; right: 0; }

        /* Messaggio installazione */
        #install-msg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- Controlli Touch -->
    <div id="dpad">
        <div id="up" class="btn"></div>
        <div id="down" class="btn"></div>
        <div id="left" class="btn"></div>
        <div id="right" class="btn"></div>
    </div>

    <div id="install-msg">Tocca lo schermo per avviare</div>

    <script>
        // --- 1. CONFIGURAZIONE PWA ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Service Worker Registrato'));
        }

        // Rileva se è dispositivo touch per mostrare i controlli
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isTouchDevice) {
            document.getElementById('dpad').style.display = 'block';
        }

        // --- 2. IL GIOCO (Semplice motore 2D) ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Adatta canvas allo schermo
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Stato del Gioco
        const player = { x: 100, y: 100, size: 32, speed: 4, color: 'red' };
        const keys = { w: false, a: false, s: false, d: false };

        // Input Tastiera (Desktop)
        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp' || e.key === 'w') keys.w = true;
            if(e.key === 'ArrowDown' || e.key === 's') keys.s = true;
            if(e.key === 'ArrowLeft' || e.key === 'a') keys.a = true;
            if(e.key === 'ArrowRight' || e.key === 'd') keys.d = true;
        });
        window.addEventListener('keyup', e => {
            if(e.key === 'ArrowUp' || e.key === 'w') keys.w = false;
            if(e.key === 'ArrowDown' || e.key === 's') keys.s = false;
            if(e.key === 'ArrowLeft' || e.key === 'a') keys.a = false;
            if(e.key === 'ArrowRight' || e.key === 'd') keys.d = false;
        });

        // Input Touch (Mobile)
        const setupTouch = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
        };
        setupTouch('up', 'w');
        setupTouch('down', 's');
        setupTouch('left', 'a');
        setupTouch('right', 'd');

        // Loop di Gioco
        function update() {
            // Movimento
            if (keys.w) player.y -= player.speed;
            if (keys.s) player.y += player.speed;
            if (keys.a) player.x -= player.speed;
            if (keys.d) player.x += player.speed;

            // Disegna Sfondo (Erba)
            ctx.fillStyle = '#5C9E66'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Griglia decorativa (effetto mattonelle)
            ctx.strokeStyle = '#4C8E56';
            ctx.lineWidth = 2;
            const tileSize = 64;
            for(let x=0; x<canvas.width; x+=tileSize) {
                ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for(let y=0; y<canvas.height; y+=tileSize) {
                ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // Disegna Player (Quadrato Rosso in stile Pokemon Red)
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            
            // Bordo player
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x, player.y, player.size, player.size);

            requestAnimationFrame(update);
        }

        update();

        // Hack per forzare fullscreen su android al primo tocco se non in standalone
        window.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
               // document.documentElement.requestFullscreen().catch(e => {});
            }
        });

    </script>
</body>
</html>
